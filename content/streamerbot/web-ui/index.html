<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=https://sorylokan.github.io/WEBWUI-Web_Interface/" />
    <title>Redirection - Web UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #050505;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(6, 182, 212, 0.12) 0%, transparent 50%);
            animation: gradientSpin 25s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            background: rgba(15, 15, 15, 0.8);
            border-radius: 16px;
            border: 1px solid rgba(124, 58, 237, 0.2);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.3),
                        0 0 40px rgba(6, 182, 212, 0.15);
            backdrop-filter: blur(20px);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.2s forwards;
        }

        p {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.4s forwards;
        }

        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.5rem;
            border: 4px solid rgba(124, 58, 237, 0.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.6s forwards, spin 1s linear 0.6s infinite;
        }

        .link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(6, 182, 212, 0.1));
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.8s forwards;
        }

        .link:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(6, 182, 212, 0.2));
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Redirecting...</h1>
        <p>You will be redirected to the Web UI interface in a few seconds.</p>
        <div class="spinner"></div>
        <a href="https://sorylokan.github.io/WEBWUI-Web_Interface/" class="link">
            Click here if you have not been redirected.
        </a>
    </div>
</body>
</html>
